<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}מלאך הזכויות{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════
       RIGHTS ANGEL — DESIGN SYSTEM
       Client palette: Deep Navy + Gold
    ═══════════════════════════════════════ */
    :root {
      --bg-deep:    #0a1628;
      --bg-navy:    #0d1f3c;
      --bg-card:    #112244;
      --bg-card2:   #162a50;
      --gold:       #c9a84c;
      --gold-light: #e4c97a;
      --gold-btn:   #d4a017;
      --gold-btn-h: #f0bb20;
      --white:      #f0e8d0;
      --muted:      #7a90aa;
      --border:     rgba(201,168,76,0.2);
      --border2:    rgba(255,255,255,0.07);
      --green:      #2ecc71;
      --yellow:     #f1c40f;
      --red:        #e74c3c;
      --blue-acc:   #4a9edd;
      --shadow:     0 8px 32px rgba(0,0,0,0.4);
      --radius:     14px;
      --radius-sm:  8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg-deep);
      color: var(--white);
      min-height: 100vh;
      direction: rtl;
      line-height: 1.6;
    }

    /* ── NAVBAR ── */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 72px;
      background: rgba(10,22,40,0.95);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .nav-logo {
      width: 44px;
      height: 44px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .nav-brand-text h1 {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 18px;
      color: var(--gold);
      font-weight: 700;
      line-height: 1.2;
    }
    .nav-brand-text p {
      font-size: 11px;
      color: var(--muted);
    }
    .nav-links {
      display: flex;
      gap: 6px;
      list-style: none;
    }
    .nav-links a {
      color: var(--white);
      text-decoration: none;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .nav-links a:hover { background: var(--bg-card); }
    .nav-links a.active {
      background: var(--bg-card);
      color: var(--gold);
    }
    .nav-langs {
      display: flex;
      gap: 4px;
    }
    .lang-btn {
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-btn:hover, .lang-btn.active {
      background: var(--gold-btn);
      color: #000;
      border-color: var(--gold-btn);
    }

    /* ── SIDEBAR NAV (Admin screens) ── */
    .admin-layout {
      display: flex;
      min-height: calc(100vh - 72px);
    }
    .sidebar {
      width: 240px;
      background: var(--bg-navy);
      border-left: 1px solid var(--border2);
      padding: 24px 0;
      flex-shrink: 0;
    }
    .sidebar-section {
      padding: 8px 20px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 16px;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      color: var(--white);
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      border-right: 3px solid transparent;
    }
    .sidebar-item:hover {
      background: var(--bg-card);
    }
    .sidebar-item.active {
      background: var(--bg-card);
      border-right-color: var(--gold);
      color: var(--gold);
    }
    .main-content {
      flex: 1;
      padding: 32px 40px;
      overflow-y: auto;
    }

    /* ── COMMON COMPONENTS ── */
    .page-header {
      margin-bottom: 32px;
    }
    .page-header h2 {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 28px;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .page-header p {
      color: var(--muted);
      font-size: 15px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-green  { background: rgba(46,204,113,0.15); color: var(--green); border: 1px solid rgba(46,204,113,0.3); }
    .badge-yellow { background: rgba(241,196,15,0.15); color: var(--yellow); border: 1px solid rgba(241,196,15,0.3); }
    .badge-red    { background: rgba(231,76,60,0.15);  color: var(--red);    border: 1px solid rgba(231,76,60,0.3); }
    .badge-blue   { background: rgba(74,158,221,0.15); color: var(--blue-acc); border: 1px solid rgba(74,158,221,0.3); }
    .badge-gold   { background: rgba(201,168,76,0.15); color: var(--gold);   border: 1px solid var(--border); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      text-decoration: none;
      font-family: 'Heebo', sans-serif;
    }
    .btn-gold {
      background: var(--gold-btn);
      color: #000;
    }
    .btn-gold:hover {
      background: var(--gold-btn-h);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(212,160,23,0.4);
    }
    .btn-outline {
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--border);
    }
    .btn-outline:hover { background: var(--bg-card2); }
    .btn-danger {
      background: rgba(231,76,60,0.2);
      color: var(--red);
      border: 1px solid rgba(231,76,60,0.3);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border2);
      margin: 20px 0;
    }

    /* ── TABLES ── */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: right;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      border-bottom: 1px solid var(--border2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    td {
      padding: 12px 14px;
      font-size: 14px;
      border-bottom: 1px solid var(--border2);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* ── FORMS ── */
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: var(--bg-navy);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      color: var(--white);
      font-size: 15px;
      font-family: 'Heebo', sans-serif;
      transition: border-color 0.2s;
      direction: rtl;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
    }
    .form-input::placeholder { color: var(--muted); }

    /* ── PROGRESS STEPS ── */
    .steps {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 32px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }
    .step-num {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }
    .step.done  { color: var(--green); }
    .step.done .step-num  { background: rgba(46,204,113,0.2); color: var(--green); }
    .step.active { color: var(--gold); }
    .step.active .step-num { background: var(--gold-btn); color: #000; }
    .step.pending { color: var(--muted); }
    .step.pending .step-num { background: var(--bg-card2); color: var(--muted); }
    .step-sep { color: var(--muted); margin: 0 4px; font-size: 12px; }

    /* ── ANIMATIONS ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim { animation: fadeInUp 0.5s ease both; }
    .anim-1 { animation-delay: 0.1s; }
    .anim-2 { animation-delay: 0.2s; }
    .anim-3 { animation-delay: 0.3s; }
    .anim-4 { animation-delay: 0.4s; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-navy); }
    ::-webkit-scrollbar-thumb { background: var(--bg-card2); border-radius: 3px; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-brand">
    <div class="nav-logo">👼</div>
    <div class="nav-brand-text">
      <h1>מלאך הזכויות</h1>
      <p>הנחות ארנונה — מילואים, ותיקים ונזקקים</p>
    </div>
  </div>

  <ul class="nav-links">
    <li><a href="/screen0" {% if active=='s0' %}class="active"{% endif %}>בית</a></li>
    <li><a href="/screen7" {% if active=='s7' %}class="active"{% endif %}>בדוק זכאות</a></li>
    <li><a href="/screen1" {% if active=='s1' %}class="active"{% endif %}>ניהול</a></li>
    <li><a href="/screen9" {% if active=='s9' %}class="active"{% endif %}>היסטוריה</a></li>
    <li><a href="/screen0#contact">צור קשר</a></li>
  </ul>

  <div class="nav-langs">
    <button class="lang-btn active">עב</button>
    <button class="lang-btn">EN</button>
    <button class="lang-btn">PY</button>
    <button class="lang-btn">עד</button>
    <button class="lang-btn">ייד</button>
    <button class="lang-btn">אמ׳</button>
  </div>
</nav>

{% block content %}{% endblock %}

</body>
</html>
